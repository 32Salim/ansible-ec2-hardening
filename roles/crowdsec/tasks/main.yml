---
- name: Install curl for CrowdSec repository setup
  ansible.builtin.apt:
    name: curl
    state: present
    update_cache: true

- name: Add CrowdSec repository
  ansible.builtin.shell: curl -s https://install.crowdsec.net | sh
  args:
    creates: /etc/apt/sources.list.d/crowdsec_crowdsec.list

- name: Install CrowdSec
  ansible.builtin.apt:
    name: crowdsec
    state: present
    update_cache: true

- name: Ensure CrowdSec service is enabled and running
  ansible.builtin.systemd:
    name: crowdsec
    enabled: true
    state: started
